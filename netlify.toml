# Remyndrs static site configuration
[build]
  publish = "."
  command = "echo 'No build command needed - static site'"

# Redirect www to non-www
[[redirects]]
  from = "https://www.remyndrs.com/*"
  to = "https://remyndrs.com/:splat"
  status = 301
  force = true

# Redirect rules (proxy API requests to backend)
[[redirects]]
  from = "/api/signup"
  to = "https://sms-reminders-api-1gmm.onrender.com/api/signup"
  status = 200
  force = true

[[redirects]]
  from = "/updates"
  to = "https://sms-reminders-api-1gmm.onrender.com/updates"
  status = 200
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets for 1 year
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache HTML for shorter period
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# =============================================================
# A/B TEST: Simple vs Original homepage
# =============================================================
# The simplified landing page lives at /index-simple.html
# and can be previewed directly at /simple
#
# TO RUN A FULL A/B TEST on Netlify:
# 1. Create a branch where index.html is replaced by the
#    simplified version (or swap filenames)
# 2. In Netlify dashboard: Site Settings > Split Testing
# 3. Set traffic split (e.g. 50/50) between main and the branch
# 4. Track results in GA4 — the simple page fires a
#    "page_variant" event with variant="simple"
# =============================================================

# Preview route: visit /simple to see the simplified page
[[redirects]]
  from = "/simple"
  to = "/index-simple.html"
  status = 200

